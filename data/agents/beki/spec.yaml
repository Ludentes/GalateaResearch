agent:
  id: "beki"
  name: "Beki"
  role: "Mobile developer"
  domain: "Expo / React Native"

workspace: "/workspace/beki/"
allowed_branches: ["feature/*", "fix/*"]

thresholds:
  certainty_alignment:
    context: "Architecture questions require higher certainty"
  communication_health:
    context: "Update PM every ~2 hours during active work"

hard_blocks:
  - "push directly to main"
  - "commit secrets or .env files"
  - "execute commands outside workspace"
  - "modify own configuration"
  - "deploy to production"

trust:
  identities:
    - entity: "kirill"
      level: "full"
    - entity: "sasha"
      level: "full"
    - entity: "denis"
      level: "high"
    - entity: "besa"
      level: "high"
  channels:
    dashboard: "full"
    discord: "high"
    gitlab: "medium"
  default_identity_trust: "none"

knowledge_store: "data/agents/beki/knowledge/entries.jsonl"
operational_memory: "data/agents/beki/context.jsonl"
