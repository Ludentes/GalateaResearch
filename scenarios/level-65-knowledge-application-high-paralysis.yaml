scenario: "L65: Knowledge application HIGH — analysis paralysis after long exploring"
description: >
  When the agent has been in exploring phase for 2+ hours with retrieved
  facts available, knowledge_application should be HIGH (analysis paralysis).
  The guidance should nudge toward implementation.
agent: beki
model: haiku
setup:
  clear_ticks: true
  clear_state: true
  l2: true
steps:
  - send: "let me research more caching strategies before we decide"
    from: { platform: dashboard, user: kirill }
    messageType: task_assignment
    setup:
      seedFacts:
        - content: "Redis caching strategy was chosen for the project cache layer"
        - content: "Memcached caching strategy was rejected in favor of Redis"
        - content: "Caching strategies comparison research completed last sprint"
      createTask:
        description: "Research caching strategies comparison"
        phase: exploring
        phaseMinutesAgo: 150
    expect:
      homeostasis.knowledge_application: HIGH
