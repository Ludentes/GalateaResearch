scenario: "L86: Dogfood — extract hardcoded timeout to config.yaml"
description: >
  Beki extracts a hardcoded timeout value from tick.ts into the engine
  config.yaml file. Tests that the agent can safely modify config and
  code in a coordinated change. Pluggable for any magic number.
agent: beki
model: sonnet
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: >
      In server/agent/tick.ts, the getAdapterTimeout() function has
      hardcoded timeout values in a switch statement (chat=120000,
      review=180000, coding=300000, etc). Move these values to
      server/engine/config.yaml under agent.adapter_timeouts (a map
      of taskType → ms). Then read them in getAdapterTimeout() via
      getConfig(). Keep the function signature the same.
    from: { platform: discord, user: kirill }
    messageType: task_assignment
    expect:
      routing.level: task
      routing.taskType: coding
      outcome.action: delegate
