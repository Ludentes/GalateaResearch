scenario: "L28: Completed task creates knowledge entries"
description: >
  When a delegated task completes successfully, the work-to-knowledge
  pipeline should create at least one knowledge entry summarizing
  what was done.
agent: beki
model: haiku
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "create a file /tmp/galatea-test-workspace/hello.ts that exports a greet function"
    from: { platform: discord, user: sasha }
    messageType: task_assignment
    expect:
      outcome.action: delegate
      outcome.knowledgeEntriesCreated: ">= 1"
