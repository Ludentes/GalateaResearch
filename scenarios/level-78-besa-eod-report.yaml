scenario: "L78: Besa PM — end of day report delegates"
description: >
  Besa receiving an end-of-day report task should delegate to the
  Claude Code adapter, which has access to the /end-of-day-report skill.
agent: besa
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "prepare the end of day status report for the team"
    from: { platform: dashboard, user: kirill }
    messageType: task_assignment
    expect:
      routing.level: task
      outcome.action: delegate
