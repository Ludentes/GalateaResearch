scenario: "L112: Knowledge application HEALTHY — exploring but under 2 hours"
description: >
  Agent in exploring phase for only 30 minutes with facts available.
  Under the 2-hour threshold, knowledge_application stays HEALTHY.
agent: beki
model: haiku
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "let me look at a few more framework comparisons"
    from: { platform: discord, user: sasha }
    messageType: chat
    setup:
      seedFacts:
        - content: "React is the most widely used frontend framework with large ecosystem"
        - content: "Vue has simpler learning curve and good TypeScript support"
      createTask:
        description: "Research frontend frameworks"
        phase: exploring
        phaseMinutesAgo: 30
    expect:
      homeostasis.knowledge_application: HEALTHY
      outcome.action: respond
