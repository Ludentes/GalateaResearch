scenario: "L124: Guidance content — analysis paralysis guidance is actionable"
description: >
  When knowledge_application is HIGH (analysis paralysis), the guidance
  should contain actionable advice about starting to build, not just
  a generic warning. Validates guidance content quality.
agent: beki
model: haiku
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "let me research more caching strategies — maybe try Varnish or Squid next"
    from: { platform: discord, user: sasha }
    messageType: chat
    setup:
      seedFacts:
        - content: "Redis caching strategy was chosen for the project cache layer"
        - content: "Memcached caching strategy was rejected in favor of Redis"
        - content: "Caching strategies comparison research completed last sprint"
      createTask:
        description: "Research caching strategies comparison"
        phase: exploring
        phaseMinutesAgo: 180
    expect:
      homeostasis.knowledge_application: HIGH
      guidance.0: "contains: paralysis"
