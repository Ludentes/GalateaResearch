scenario: "L63: Certainty alignment defaults HEALTHY without LLM assessment"
description: >
  certainty_alignment is an L2 (LLM-assessed) dimension. When the LLM
  assessment is unavailable or returns HEALTHY, the dimension should default
  to HEALTHY. This scenario confirms the baseline behavior.
agent: beki
model: haiku
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "can you check the test results for the last commit?"
    from: { platform: dashboard, user: kirill }
    messageType: chat
    expect:
      homeostasis.certainty_alignment: HEALTHY
      outcome.action: respond
