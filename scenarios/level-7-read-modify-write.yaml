scenario: "L7: Read existing file, modify, write back"
agent: beki
model: haiku
type: dogfood
setup:
  clear_ticks: true
steps:
  - send: "Read the file vite.config.ts, then tell me how many Vite plugins are configured and what their names are."
    from: { platform: discord, user: sasha }
    messageType: chat
    expect:
      outcome.action: respond
      outcome.response: "contains: plugin"
      execution.toolCalls: ">= 1"
