scenario: "L77: Coding task — delegates with tool access"
description: >
  A coding task assignment should delegate to the Claude Code adapter.
  The adapter has access to read_file, write_file, list_files, and bash
  tools for implementation work.
agent: beki
type: dogfood
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "implement the password reset flow in the auth module"
    from: { platform: dashboard, user: kirill }
    messageType: task_assignment
    expect:
      routing.level: task
      routing.taskType: coding
      outcome.action: delegate
