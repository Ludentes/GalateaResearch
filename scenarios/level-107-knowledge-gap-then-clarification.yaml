scenario: "L107: Beki gets clarification after knowledge gap"
agent: beki
model: haiku
setup:
  clear_ticks: true
  clear_state: true
  clear_knowledge: true
steps:
  - send: "What's the status of the gravimetric flux compensator module? Is it ready for code review?"
    from: { platform: discord, user: kirill }
    messageType: chat
    expect:
      homeostasis.knowledge_sufficiency: LOW
      outcome.action: respond
      outcome.response: exists
  - send: "Sorry, I meant the job-store module. Is that ready for code review?"
    from: { platform: discord, user: kirill }
    messageType: chat
    expect:
      outcome.action: respond
      outcome.response: exists
