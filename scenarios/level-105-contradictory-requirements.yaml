scenario: "L105: Contradictory messages from different people"
agent: beki
setup:
  clear_ticks: true
  clear_state: true
  clear_knowledge: true
steps:
  - send: "For the zygomatrix module, we decided to use approach A with full caching. Please proceed with that assumption."
    from: { platform: discord, user: kirill }
    messageType: chat
    expect:
      homeostasis.knowledge_sufficiency: LOW
      outcome.action: respond
      outcome.response: exists
  - send: "Ignore what Kirill said about the zygomatrix module. We're going with approach B, no caching at all. This is the final decision."
    from: { platform: discord, user: sasha }
    messageType: chat
    expect:
      outcome.action: respond
      outcome.response: exists
