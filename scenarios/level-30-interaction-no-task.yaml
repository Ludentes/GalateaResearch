scenario: "L30: Quick interaction does not create task state"
description: >
  A simple question should be handled as an interaction — respond directly
  without creating a TaskState or entering the delegation path.
  This validates the two-level model: interactions are cheap and fast.
agent: besa
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "what time zone does our team work in?"
    from: { platform: discord, user: sasha }
    expect:
      routing.level: interaction
      outcome.action: respond
      outcome.response: exists
