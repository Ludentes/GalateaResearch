scenario: "L64: Knowledge application HEALTHY — normal task without long exploring"
description: >
  When the agent has no active task in exploring phase (or exploring for
  less than 2 hours), knowledge_application should be HEALTHY. This is the
  default/baseline state for most interactions.
agent: beki
model: haiku
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "implement the login form component"
    from: { platform: dashboard, user: kirill }
    messageType: task_assignment
    expect:
      homeostasis.knowledge_application: HEALTHY
      routing.level: task
