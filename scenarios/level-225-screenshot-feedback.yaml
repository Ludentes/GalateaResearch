scenario: "L225: Visual feedback on landing page screenshot (beki)"
agent: beki
model: sonnet
type: dogfood
setup:
  clear_state: true
  clear_ticks: true
  clear_knowledge: true
steps:
  - send:
      - type: text
        text: "Take a look at this screenshot of our landing page hero section. The background is too dark — can you lighten the hero section background color? It should feel more airy and welcoming."
      - type: image
        source:
          type: base64
          media_type: image/png
          data: ""
    from:
      platform: dashboard
      user: sasha
    messageType: task_assignment
    expect:
      homeostasis.self_preservation: HEALTHY
      homeostasis.knowledge_sufficiency: "matches: ^(HEALTHY|LOW)$"
      routing.level: task
      routing.taskType: coding
      outcome.action: "matches: ^(respond|delegate)$"
