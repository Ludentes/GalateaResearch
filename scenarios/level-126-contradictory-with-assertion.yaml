scenario: "L126: Contradictory requirements — agent flags uncertainty"
description: >
  When two trusted users give conflicting instructions, the agent should
  respond acknowledging the conflict. Step 2 has stronger assertions than
  L105 — checks that the response mentions the contradiction.
agent: beki
setup:
  clear_ticks: true
  clear_state: true
  clear_knowledge: true
steps:
  - send: "For the job-store module, we decided to use PostgreSQL with JSONB columns. Please proceed with that approach."
    from: { platform: discord, user: kirill }
    messageType: chat
    expect:
      outcome.action: respond
      outcome.response: exists
  - send: "Ignore what Kirill said about the job-store module. We're going with SQLite for simplicity. This is the final decision."
    from: { platform: discord, user: sasha }
    messageType: chat
    expect:
      outcome.action: respond
      outcome.response: "contains: conflict"
