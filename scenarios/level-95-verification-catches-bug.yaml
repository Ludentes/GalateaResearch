scenario: "L95: Pipeline verification catches issues in implementation"
description: >
  Beki implements a small utility feature. The pipeline-enforced
  VERIFY phase should automatically run tests and linting after
  the implementation, catching and fixing any issues before
  reporting completion. Tests the VERIFY stage of the work lifecycle.
agent: beki
type: dogfood
model: sonnet
setup:
  l2: true
  clear_ticks: true
  clear_state: true
steps:
  - send: >
      Add a utility function to server/agent/utils.ts that
      converts a duration in milliseconds to a human-readable
      string like "2m 30s" or "45s" or "1h 5m". Write a test
      file at server/agent/__tests__/utils.test.ts with at least
      5 cases covering seconds, minutes, hours, and edge cases
      like 0ms. Use /test-driven-development.
    from: { platform: discord, user: kirill }
    messageType: task_assignment
    expect:
      routing.level: task
      outcome.action: delegate
