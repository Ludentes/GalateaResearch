scenario: "L111: Knowledge application HEALTHY — no active task"
description: >
  Without an active task in exploring phase, knowledge_application
  should stay HEALTHY regardless of message content. The analysis
  paralysis detector only fires when taskPhase === "exploring".
agent: beki
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "I've been reading about different database options all morning"
    from: { platform: discord, user: sasha }
    messageType: chat
    expect:
      homeostasis.knowledge_application: HEALTHY
      outcome.action: respond
