scenario: "L230: Besa investigates broken build, creates issue, delegates to Beki"
description: >
  Kirill reports that agenttestproject build is broken. Besa (PM) should
  investigate the build error, understand the root cause, create a GitLab
  issue with findings, and delegate the fix to Beki.
  State: master has Hero + HowItWorks, build broken (test file in pages/),
  2 open issues (#2 Pricing, #3 Footer), 0 open MRs.
  SAFETY: gitlab.maugry.ru is production — no destructive actions.
agent: besa
model: sonnet
type: dogfood
setup:
  l2: true
  clear_ticks: true
steps:
  - send: >
      The agenttestproject build is broken — `pnpm build` fails in
      /home/newub/w/agentsproject/agenttestproject. Dev server
      and tests work fine, only the production build crashes. Can you
      investigate what's wrong, create a GitLab issue with your findings,
      and get Beki to fix it? The repo is kyurkov/agenttestproject.
      IMPORTANT: gitlab.maugry.ru is our production GitLab — no
      destructive actions of any kind.
    from: { platform: dashboard, user: kirill }
    messageType: task_assignment
    expect:
      outcome.action: delegate
      outcome.response: exists
