scenario: "L230: Besa investigates broken build, creates issue, delegates to Beki"
description: >
  Kirill reports that agenttestproject build is broken. Besa (PM) should
  investigate the error, create a GitLab issue with findings, and delegate
  the fix to Beki. The actual error: test files inside src/pages/ are
  picked up as Astro routes during build, causing vitest internal state
  errors. SAFETY: gitlab.maugry.ru is production — no destructive actions.
agent: besa
model: sonnet
type: dogfood
setup:
  l2: true
  clear_ticks: true
steps:
  - send: >
      The agenttestproject at /home/newub/w/galatea/workspaces/agenttestproject
      has a broken build. When I run `pnpm build` it fails with a vitest
      import error — vitest is being imported at build time somehow.
      The dev server works fine and tests pass, but the production build
      is broken. Can you investigate and get this fixed? The project is
      an Astro landing page for Galatea. Repo is on GitLab at
      kyurkov/agenttestproject. Please create a GitLab issue with your
      findings and assign the fix to Beki.
      IMPORTANT: gitlab.maugry.ru is our production GitLab — absolutely
      no destructive actions (no force push, no deletion of anything,
      no permission changes).
    from: { platform: dashboard, user: kirill }
    messageType: task_assignment
    expect:
      routing.level: task
      outcome.action: delegate
