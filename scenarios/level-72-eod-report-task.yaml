scenario: "L72: End-of-day report task delegates to adapter"
description: >
  An end-of-day report request should be routed as an admin task and
  delegated to the Claude Code adapter, which can use the /end-of-day-report
  skill. Verifies routing and delegation for report-type tasks.
agent: beki
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "create an end of day report summarizing today's work"
    from: { platform: dashboard, user: kirill }
    messageType: task_assignment
    expect:
      routing.level: task
      outcome.action: delegate
