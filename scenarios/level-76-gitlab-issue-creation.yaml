scenario: "L76: GitLab issue creation task — routes as admin"
description: >
  Creating a GitLab issue should route as taskType: admin and delegate
  to the Claude Code adapter. The adapter can use glab CLI to create
  issues programmatically.
agent: besa
model: haiku
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "create an issue for the login page mobile responsiveness bug"
    from: { platform: dashboard, user: kirill }
    messageType: task_assignment
    expect:
      routing.level: task
      routing.taskType: admin
      outcome.action: delegate
