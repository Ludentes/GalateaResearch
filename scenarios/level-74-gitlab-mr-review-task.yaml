scenario: "L74: GitLab MR review task — routes as review, delegates"
description: >
  A merge request review task should be routed as taskType: review and
  delegated to the Claude Code adapter. The adapter can use glab CLI
  via the bash tool to fetch MR details.
agent: beki
setup:
  clear_ticks: true
  clear_state: true
steps:
  - send: "review MR !42 on the authentication branch"
    from: { platform: dashboard, user: kirill }
    messageType: task_assignment
    expect:
      routing.level: task
      routing.taskType: review
      outcome.action: delegate
